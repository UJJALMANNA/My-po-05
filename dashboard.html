<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — UM.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    /* ── TOKENS ── */
    :root {
      --c1: #6C5CE7; --c2: #A35CE7; --c3: #F368B0; --c4: #FF9F5A; --c5: #4FD1C5;
      --ink: #19182B; --ink-dim: #5B5874; --bg: #0D0B18; --surface: #13111F;
      --surface2: #1C1930; --line: rgba(255,255,255,0.07);
      --grad: linear-gradient(120deg,var(--c1),var(--c2) 50%,var(--c3));
      --grad2: linear-gradient(120deg,var(--c3),var(--c4));
      --grad3: linear-gradient(120deg,var(--c5),var(--c1));
      --ff-display: 'Outfit',sans-serif;
      --ff-body: 'Plus Jakarta Sans',sans-serif;
      --ff-mono: 'JetBrains Mono',monospace;
      --nav-h: 64px;
      --r: 16px; --r-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ── BACKGROUND ORBS ── */
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px);
      animation: orbFloat 18s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: rgba(108,92,231,0.18); top: -100px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: rgba(243,104,176,0.14); top: 30%; right: -100px; animation-delay: -6s; }
    .orb3 { width: 350px; height: 350px; background: rgba(79,209,197,0.10); bottom: -80px; left: 30%; animation-delay: -12s; }
    @keyframes orbFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,40px) scale(1.08); }
    }

    /* ── NAV ── */
    @keyframes navIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes borderFlow {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: rgba(10,8,18,0.85);
      backdrop-filter: blur(20px);
      animation: navIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    .nav::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px;
      background: linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c1));
      background-size: 300% 100%;
      animation: borderFlow 5s linear infinite;
    }
    .nav__mark {
      font-family: var(--ff-display); font-weight: 800; font-size: 1.3rem;
      background: linear-gradient(90deg,#fff,var(--c2),var(--c3),#fff);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: shimmer 4s linear infinite;
    }
    .nav__mark-dot { color: var(--c4); -webkit-text-fill-color: var(--c4); }
    .nav__right { display: flex; align-items: center; gap: 1rem; }
    .nav__links { display: flex; gap: 0.2rem; align-items: center; }
    .nav__links a {
      color: rgba(255,255,255,0.7); font-size: 0.88rem; font-weight: 600;
      padding: 0.45em 0.9em; border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    .nav__links a:hover, .nav__links a.active { color: #fff; background: rgba(255,255,255,0.08); }
    .nav__user {
      display: flex; align-items: center; gap: 0.6rem;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px; padding: 0.4em 1em;
    }
    .nav__user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff;
    }
    .nav__user-name { font-size: 0.88rem; font-weight: 700; color: #fff; }
    .nav__logout {
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.75); border-radius: 999px; padding: 0.4em 1em;
      font-size: 0.85rem; font-weight: 600;
      transition: all 0.2s;
    }
    .nav__logout:hover { border-color: var(--c3); color: var(--c3); }

    /* ── MAIN LAYOUT ── */
    .dash {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: calc(var(--nav-h) + 2rem) 1.5rem 3rem;
    }

    /* ── WELCOME HERO ── */
    .welcome {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r); padding: 1.75rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1.5rem;
      margin-bottom: 1.25rem;
      position: relative; overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .welcome::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg,rgba(108,92,231,0.1),rgba(243,104,176,0.06),transparent);
      pointer-events: none;
    }
    .welcome__left { display: flex; align-items: center; gap: 1rem; }
    .welcome__avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-display); font-size: 1.3rem; font-weight: 800; color: #fff;
      flex-shrink: 0; box-shadow: 0 0 0 4px rgba(108,92,231,0.25);
    }
    .welcome__text h1 {
      font-family: var(--ff-display); font-size: 1.5rem; font-weight: 800;
      background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .welcome__text p { font-size: 0.9rem; color: rgba(255,255,255,0.55); margin-top: 0.2rem; }
    .welcome__right { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .exam-pill {
      background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.35);
      border-radius: 999px; padding: 0.5em 1.2em;
      font-family: var(--ff-mono); font-size: 0.82rem; font-weight: 700; color: #b3a8f7;
    }
    .countdown { text-align: center; }
    .countdown__num {
      font-family: var(--ff-display); font-size: 2.5rem; font-weight: 800; line-height: 1;
      background: var(--grad2); -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .countdown__label { font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-top: 0.2rem; font-family: var(--ff-mono); }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem;
      margin-bottom: 1.25rem;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
      padding: 1.25rem 1.5rem; position: relative; overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.5s ease both;
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
    .stat-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card:nth-child(1)::after { background: var(--grad); }
    .stat-card:nth-child(2)::after { background: var(--grad2); }
    .stat-card:nth-child(3)::after { background: var(--grad3); }
    .stat-card:nth-child(4)::after { background: linear-gradient(90deg,var(--c4),var(--c3)); }
    .stat-card__icon {
      font-size: 1.4rem; margin-bottom: 0.75rem;
      width: 40px; height: 40px; border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .stat-card:nth-child(1) .stat-card__icon { background: rgba(108,92,231,0.15); }
    .stat-card:nth-child(2) .stat-card__icon { background: rgba(243,104,176,0.15); }
    .stat-card:nth-child(3) .stat-card__icon { background: rgba(79,209,197,0.15); }
    .stat-card:nth-child(4) .stat-card__icon { background: rgba(255,159,90,0.15); }
    .stat-card__val {
      font-family: var(--ff-display); font-size: 2rem; font-weight: 800; color: #fff; line-height: 1;
    }
    .stat-card__label { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 0.3rem; font-weight: 600; }
    .stat-card__sub { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 0.25rem; }

    /* ── MID GRID ── */
    .mid-grid {
      display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r); padding: 1.5rem;
      animation: fadeUp 0.5s ease both;
    }
    .card__title {
      font-family: var(--ff-display); font-size: 1rem; font-weight: 700;
      color: rgba(255,255,255,0.9); margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .card__title-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── SUBJECT PROGRESS ── */
    .subj-row {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.9rem;
    }
    .subj-row:last-child { margin-bottom: 0; }
    .subj-name { font-size: 0.85rem; color: rgba(255,255,255,0.75); width: 140px; flex-shrink: 0; font-weight: 500; }
    .subj-bar-bg {
      flex: 1; height: 6px; background: rgba(255,255,255,0.07);
      border-radius: 999px; overflow: hidden;
    }
    .subj-bar-fill {
      height: 100%; border-radius: 999px;
      width: 0%; transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .subj-pct { font-family: var(--ff-mono); font-size: 0.78rem; color: rgba(255,255,255,0.5); width: 34px; text-align: right; }

    /* ── STREAK ── */
    .streak-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 0.6rem; padding: 0.5rem 0; }
    @keyframes fireFlicker {
      0%,100% { transform: scaleY(1) rotate(-2deg); }
      50%      { transform: scaleY(1.08) rotate(2deg); }
    }
    .streak-fire { font-size: 3rem; animation: fireFlicker 1.2s ease-in-out infinite; display: inline-block; }
    .streak-num {
      font-family: var(--ff-display); font-size: 3.5rem; font-weight: 800; line-height: 1;
      background: var(--grad2); -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .streak-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); font-weight: 600; }
    .streak-days { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .day-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
    }
    .day-done   { background: rgba(108,92,231,0.25); color: #b3a8f7; border: 1px solid rgba(108,92,231,0.4); }
    .day-miss   { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }
    .day-today  { background: var(--grad); color: #fff; box-shadow: 0 0 12px rgba(108,92,231,0.5); }

    /* ── CHARTS ── */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .chart-wrap { position: relative; width: 100%; height: 220px; }

    /* ── BOTTOM GRID ── */
    .bottom-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;
    }

    /* ── ACTIVITY ── */
    .activity-item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.75rem 0; border-bottom: 1px solid var(--line);
    }
    .activity-item:last-child { border-bottom: none; }
    .act-icon {
      width: 32px; height: 32px; border-radius: var(--r-sm); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .act-title { font-size: 0.88rem; color: rgba(255,255,255,0.85); font-weight: 600; }
    .act-time  { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 0.2rem; }

    /* ── GOALS ── */
    .goal-item { margin-bottom: 1rem; }
    .goal-item:last-child { margin-bottom: 0; }
    .goal-top { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .goal-name { font-size: 0.88rem; color: rgba(255,255,255,0.8); font-weight: 600; }
    .goal-val  { font-family: var(--ff-mono); font-size: 0.8rem; color: rgba(255,255,255,0.45); }
    .goal-bar-bg { height: 7px; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; }
    .goal-bar-fill { height: 100%; border-radius: 999px; width: 0%; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
    .ai-tip {
      margin-top: 1.2rem; padding: 0.9rem 1rem;
      background: rgba(108,92,231,0.1); border: 1px solid rgba(108,92,231,0.25);
      border-radius: var(--r-sm);
    }
    .ai-tip__label { font-size: 0.75rem; font-weight: 700; color: var(--c2); margin-bottom: 0.3rem; font-family: var(--ff-mono); text-transform: uppercase; letter-spacing: 0.05em; }
    .ai-tip__text  { font-size: 0.85rem; color: rgba(255,255,255,0.65); line-height: 1.5; }

    /* ── ONBOARDING (pick exam) ── */
    .onboard {
      max-width: 560px; margin: 4rem auto; text-align: center;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--r); padding: 2.5rem 2rem;
      animation: fadeUp 0.5s ease both;
    }
    .onboard h2 { font-family: var(--ff-display); font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
    .onboard p { color: rgba(255,255,255,0.55); margin-bottom: 1.75rem; font-size: 0.92rem; }
    .onboard__row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; text-align: left; }
    .onboard__field { flex: 1; min-width: 180px; }
    .onboard__field label {
      display: block; font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.5);
      margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .onboard__field select, .onboard__field input {
      width: 100%; padding: 0.7em 0.9em; border-radius: var(--r-sm);
      background: var(--surface2); border: 1px solid var(--line); color: #fff;
      font-family: inherit; font-size: 0.92rem;
    }
    .onboard__field select:focus, .onboard__field input:focus { outline: none; border-color: var(--c1); }
    .btn-primary {
      background: var(--grad); color: #fff; border: none;
      padding: 0.85em 2.2em; border-radius: 999px; font-weight: 700; font-size: 0.95rem;
      transition: transform 0.2s, filter 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── LOG SESSION ── */
    .btn-log {
      background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.4);
      color: #cabdfb; border-radius: 999px; padding: 0.55em 1.3em;
      font-weight: 700; font-size: 0.85rem; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-log:hover { background: rgba(108,92,231,0.25); transform: translateY(-2px); }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1rem;
      animation: fadeUp 0.25s ease both;
    }
    .modal {
      background: var(--surface2); border: 1px solid var(--line); border-radius: var(--r);
      padding: 1.75rem; width: 100%; max-width: 420px;
    }
    .modal h3 { font-family: var(--ff-display); font-size: 1.2rem; font-weight: 800; margin-bottom: 1.2rem; }
    .modal__field { margin-bottom: 1rem; text-align: left; }
    .modal__field label {
      display: block; font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.5);
      margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .modal__field select, .modal__field input {
      width: 100%; padding: 0.65em 0.85em; border-radius: var(--r-sm);
      background: var(--surface); border: 1px solid var(--line); color: #fff;
      font-family: inherit; font-size: 0.9rem;
    }
    .modal__field select:focus, .modal__field input:focus { outline: none; border-color: var(--c1); }
    .modal__actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-ghost {
      background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7);
      padding: 0.65em 1.4em; border-radius: 999px; font-weight: 600; font-size: 0.88rem; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.35); color: #fff; }
    .empty-note {
      text-align: center; padding: 1.5rem 1rem; color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
    }

    /* ── NOT LOGGED IN ── */
    .not-logged {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 1rem; text-align: center;
    }
    .not-logged h2 { font-family: var(--ff-display); font-size: 1.8rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .not-logged p  { color: rgba(255,255,255,0.5); }
    .btn-login {
      background: var(--grad); color: #fff; border: none;
      padding: 0.85em 2em; border-radius: 999px; font-weight: 700; font-size: 1rem;
      margin-top: 0.5rem; transition: transform 0.2s, filter 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ── NO PLAN ── */
    .no-plan {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
      padding: 3rem 2rem; text-align: center;
    }
    .no-plan h3 { font-family: var(--ff-display); font-size: 1.4rem; font-weight: 800; margin-bottom: 0.75rem; color: #fff; }
    .no-plan p  { color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
    .btn-go {
      display: inline-block; background: var(--grad); color: #fff;
      padding: 0.75em 1.8em; border-radius: 999px; font-weight: 700; font-size: 0.95rem;
      transition: transform 0.2s, filter 0.2s;
    }
    .btn-go:hover { transform: translateY(-2px); filter: brightness(1.1); }

    /* ── LOADING ── */
    .loading {
      display: flex; align-items: center; justify-content: center; min-height: 60vh;
      flex-direction: column; gap: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(108,92,231,0.2);
      border-top-color: var(--c1);
      animation: spin 0.9s linear infinite;
    }
    .loading p { color: rgba(255,255,255,0.45); font-family: var(--ff-mono); font-size: 0.85rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .mid-grid, .charts-grid, .bottom-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .welcome { flex-direction: column; }
      .nav__links { display: none; }
    }

    /* ── TODO + FOCUS CLOCK ── */
    .section-card {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
      padding: 1.5rem; animation: fadeUp 0.5s ease both;
    }
    .todo-row {
      display: flex; gap: 8px; margin-bottom: 1rem;
    }
    .todo-row input[type="text"], .todo-row select {
      background: var(--surface2); border: 1px solid var(--line); border-radius: var(--r-sm);
      color: #fff; padding: 0.55em 0.8em; font-family: inherit; font-size: 0.88rem;
    }
    .todo-row input[type="text"] { flex: 1; }
    .todo-row select { width: 130px; }
    .todo-row button {

// HELPERS

function daysLeft(examKey, year) {
  const month = EXAM_MONTHS[examKey] || 2;
  const examDate = new Date(year, month - 1, 15);
  return Math.max(0, Math.floor((examDate - new Date()) / 86400000));
}

function getInitials(name) {
  return name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : 'ST';
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isoDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function mondayIndexOf(date) {
  // JS getDay(): 0=Sun..6=Sat. We want Mon=0..Sun=6
  return (date.getDay() + 6) % 7;
}

function animateBars() {
  setTimeout(() => {
    document.querySelectorAll('.subj-bar-fill, .goal-bar-fill').forEach(el => {
      el.style.width = el.dataset.width;
    });
  }, 100);
}

function timeAgo(isoString) {
  const diffMs = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins} min ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs} hr${hrs>1?'s':''} ago`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'Yesterday';
  if (days < 7) return `${days} days ago`;
  return new Date(isoString).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}

function getAITip(subjects, progress, totalLogged) {
  if (!totalLogged) {
    return 'You haven\'t logged any study sessions yet. Log your first session to start tracking real progress.';
  }
  const weak = subjects.filter((_,i) => (progress[i]||0) < 50);
  if (weak.length) return `Focus on <strong>${weak[0]}</strong> — you're below 50%. Spend 45 mins on it today.`;
  const avg = progress.reduce((a,b)=>a+b,0)/progress.length;
  if (avg > 75) return 'Great progress! Start taking full-length mock tests to simulate exam conditions.';
  return 'Keep consistent — aim for at least 1 new topic per day and review yesterday\'s notes each morning.';
}

// ════════════════════════════════════════════════════════════
// STREAK CALCULATION — based on real last_study_date
// ════════════════════════════════════════════════════════════
function computeLiveStreak(storedStreak, lastStudyDate) {
  if (!lastStudyDate) return 0;
  const today = todayISO();
  const yesterday = isoDaysAgo(1);
  if (lastStudyDate === today || lastStudyDate === yesterday) {
    return storedStreak || 0;
  }
  // missed more than a day — streak is broken
  return 0;
}

      </div>

        <button class="btn-primary" id="logSave">Save session</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
  document.getElementById('logCancel').addEventListener('click', () => backdrop.remove());
  document.getElementById('logSave').addEventListener('click', async () => {
    const subject = document.getElementById('logSubject').value;
    const minutes = parseInt(document.getElementById('logMinutes').value);
    const note    = document.getElementById('logNote').value.trim();
    if (!minutes || minutes < 1) { alert('Enter a valid number of minutes.'); return; }

    const saveBtn = document.getElementById('logSave');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';

    try {
      await saveStudySession(subject, minutes, note);
      backdrop.remove();
      await renderDashboard(true);
    } catch (e) {
      console.error(e);
      saveBtn.disabled = false; saveBtn.textContent = 'Save session';
      alert('Could not save session. Please try again.');
    }
  });
}

async function saveStudySession(subject, minutes, note) {
  const row = CURRENT_ROW;
  const subjects = EXAM_SUBJECTS[row.exam_key] || [];
  const subjIdx = subjects.indexOf(subject);

  // 1) Insert the session record (real activity feed)
  const { error: sessErr } = await supabaseClient.from('study_sessions').insert({
    user_id: CURRENT_USER.id,
    subject,
    minutes,
    note: note || null,
  });
  if (sessErr) throw sessErr;

  // 2) Update subject_progress (cap at 100, +2% per 30 mins studied as a simple realistic model)
  const progress = [...(row.subject_progress || Array(subjects.length).fill(0))];
  if (subjIdx >= 0) {
    const gain = Math.round((minutes / 30) * 2);
    progress[subjIdx] = Math.min(100, (progress[subjIdx]||0) + gain);
  }

  // 3) Update weekly_hours for today's slot
  const weeklyHours = [...(row.weekly_hours || [0,0,0,0,0,0,0])];
  const todayIdx = mondayIndexOf(new Date());
  weeklyHours[todayIdx] = Math.round(((weeklyHours[todayIdx]||0) + minutes/60) * 100) / 100;

  // 4) Update streak based on last_study_date
  const today = todayISO();
  const yesterday = isoDaysAgo(1);
  let streak = row.streak || 0;
  if (row.last_study_date === today) {
    // already studied today, streak unchanged
  } else if (row.last_study_date === yesterday) {
    streak += 1;
  } else {
    streak = 1; // broken streak, restart
  }

  // 5) Update total_hours
  const totalHours = Math.round(((row.total_hours || 0) + minutes/60) * 100) / 100;

  const updates = {
    subject_progress: progress,
    weekly_hours: weeklyHours,
    streak,
    last_study_date: today,
    total_hours: totalHours,
  };

  const { error: updErr } = await supabaseClient
    .from('student_progress')
    .update(updates)
    .eq('user_id', CURRENT_USER.id);
  if (updErr) throw updErr;

  Object.assign(CURRENT_ROW, updates);
}

// TODO LIST
// ════════════════════════════════════════════════════════════
const SUBJ_COLORS_MAP = {};
let TODOS = [];
let TODO_CHART = null;
let TODO_CHART_TYPE = 'doughnut';

async function initTodos(subjects) {
  const { data, error } = await supabaseClient
    .from('todos')
    .select('*')
    .eq('user_id', CURRENT_USER.id)
    .order('created_at', { ascending: false });
  TODOS = error ? [] : data;

  renderTodos();
  renderTodoChart();

  document.getElementById('todoAdd').addEventListener('click', () => addTodo());
  document.getElementById('todoText').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTodo();
  });
  document.getElementById('todoSubject').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTodo();
  });
  document.querySelectorAll('.chart-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      TODO_CHART_TYPE = btn.dataset.type;
      renderTodoChart();
    });
  });
}

function getTodoSubjectColor(subject) {
  if (!SUBJ_COLORS_MAP[subject]) {
    const idx = Object.keys(SUBJ_COLORS_MAP).length;
    SUBJ_COLORS_MAP[subject] = SUBJECT_COLORS[idx % SUBJECT_COLORS.length];
  }
  return SUBJ_COLORS_MAP[subject];
}

async function addTodo() {
  const input = document.getElementById('todoText');
  const text = input.value.trim();
  if (!text) return;
  const subjEl = document.getElementById('todoSubject');
  const subject = subjEl.value.trim() || 'General';

  const newTodo = { user_id: CURRENT_USER.id, subject, text, is_done: false };
  const { data, error } = await supabaseClient.from('todos').insert(newTodo).select().single();
  if (error) { console.error(error); alert('Could not add task.'); return; }

  TODOS.unshift(data);
  input.value = '';
  subjEl.value = '';
  renderTodos();
  renderTodoChart();
}

function renderTodos() {
  const list = document.getElementById('todoList');
  const done = TODOS.filter(t => t.is_done).length;
  document.getElementById('todoCount').textContent = `${done} of ${TODOS.length} done`;

  if (!TODOS.length) {
    list.innerHTML = `<div class="empty-note">No tasks yet — add your first one above.</div>`;
    return;
  }

  list.innerHTML = TODOS.map(t => `
    <div class="todo-item">
      <input type="checkbox" ${t.is_done ? 'checked' : ''} data-id="${t.id}" class="todo-check" />
      <span class="dot" style="background:${getTodoSubjectColor(t.subject)}"></span>
      <span class="txt ${t.is_done ? 'done' : ''}">${t.text}</span>
      <span class="subj-tag">${t.subject}</span>
      <button class="del-btn" data-id="${t.id}" aria-label="Delete task">✕</button>
    </div>
  `).join('');

  list.querySelectorAll('.todo-check').forEach(cb => {
    cb.addEventListener('change', async () => {
      const id = parseInt(cb.dataset.id);
      const todo = TODOS.find(t => t.id === id);
      todo.is_done = cb.checked;
      renderTodos();
      renderTodoChart();
      await supabaseClient.from('todos').update({ is_done: cb.checked }).eq('id', id);
    });
  });
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.id);
      TODOS = TODOS.filter(t => t.id !== id);
      renderTodos();
      renderTodoChart();
      await supabaseClient.from('todos').delete().eq('id', id);
    });
  });
}

function renderTodoChart() {
  const ctx = document.getElementById('todoChart');
  if (!ctx) return;
  const subjects = [...new Set(TODOS.map(t => t.subject))];

  if (!subjects.length) {
    if (TODO_CHART) { TODO_CHART.destroy(); TODO_CHART = null; }
    return;
  }

  const data = subjects.map(s => {
    const items = TODOS.filter(t => t.subject === s);
    return items.length ? Math.round((items.filter(t => t.is_done).length / items.length) * 100) : 0;
  });
  const hexColors = subjects.map(s => getTodoSubjectColor(s));
  if (TODO_CHART) TODO_CHART.destroy();

  let config;
  if (TODO_CHART_TYPE === 'doughnut') {
    config = {
      type: 'doughnut',
      data: { labels: subjects, datasets: [{ data, backgroundColor: hexColors, borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    };
  } else if (TODO_CHART_TYPE === 'bar') {
    config = {
      type: 'bar',
      data: { labels: subjects, datasets: [{ label: 'Completion %', data, backgroundColor: hexColors, borderRadius: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 10 } }, grid: { display: false } },
          y: { beginAtZero: true, max: 100, ticks: { color: 'rgba(255,255,255,0.45)', callback: v => v+'%' }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    };
  } else {
    config = {
      type: 'radar',
      data: { labels: subjects, datasets: [{ label: 'Completion %', data, backgroundColor: 'rgba(108,92,231,0.2)', borderColor: '#A35CE7', pointBackgroundColor: '#F368B0' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { r: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.07)' }, angleLines: { color: 'rgba(255,255,255,0.07)' }, ticks: { display: false }, pointLabels: { color: 'rgba(255,255,255,0.55)', font: { size: 10 } } } }
      }
    };
  }
  TODO_CHART = new Chart(ctx, config);
}

// FOCUS STOPWATCH / TIMER — persists across tab close via active_session
// ════════════════════════════════════════════════════════════
let CLOCK_MODE = 'stopwatch';
let CLOCK_RUNNING = false;
let CLOCK_START_TS = null;
let CLOCK_ELAPSED_BEFORE_PAUSE = 0;
let CLOCK_TARGET_SECONDS = 25 * 60;
let CLOCK_TICK = null;
let TODAY_SESSIONS = [];

function fmtClock(totalSeconds) {
  totalSeconds = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  const pad = n => n < 10 ? '0'+n : ''+n;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function currentClockElapsed() {
  if (!CLOCK_RUNNING) return CLOCK_ELAPSED_BEFORE_PAUSE;
  return CLOCK_ELAPSED_BEFORE_PAUSE + (Date.now() - CLOCK_START_TS) / 1000;
}

function updateClockDisplay() {
  const el = document.getElementById('clockDisplay');
  if (!el) return;
  if (CLOCK_MODE === 'stopwatch') {
    el.textContent = fmtClock(currentClockElapsed());
  } else {
    const remaining = CLOCK_TARGET_SECONDS - currentClockElapsed();
    if (remaining <= 0) {
      el.textContent = '00:00:00';
      finishFocusSession(true);
      return;
    }
    el.textContent = fmtClock(remaining);
  }
}

function setClockButtons(state) {
  const start = document.getElementById('clockStart');
  const pause = document.getElementById('clockPause');
  const finish = document.getElementById('clockFinish');
  const reset = document.getElementById('clockReset');
  if (state === 'idle') {
    start.style.display = 'inline-block'; pause.style.display = 'none';
    finish.style.display = 'none'; reset.style.display = 'none';
  } else if (state === 'running') {
    start.style.display = 'none'; pause.style.display = 'inline-block';
    finish.style.display = 'inline-block'; reset.style.display = 'inline-block';
  } else if (state === 'paused') {
    start.style.display = 'inline-block'; pause.style.display = 'none';
    finish.style.display = 'inline-block'; reset.style.display = 'inline-block';
  }
}

async function initFocusClock() {
  const { data: row } = await supabaseClient
    .from('student_progress').select('active_session').eq('user_id', CURRENT_USER.id).maybeSingle();

  if (row && row.active_session) {
    const sess = row.active_session;
    CLOCK_MODE = sess.mode;
    CLOCK_TARGET_SECONDS = sess.target_seconds || 1500;
    CLOCK_ELAPSED_BEFORE_PAUSE = sess.paused_elapsed || 0;
    if (sess.running) {
      CLOCK_RUNNING = true;
      CLOCK_START_TS = new Date(sess.start_time).getTime();
      document.getElementById('clockStatus').textContent = 'Resumed — was running in background';
      setClockButtons('running');
      CLOCK_TICK = setInterval(updateClockDisplay, 1000);
    } else {
      setClockButtons('paused');
      document.getElementById('clockStatus').textContent = 'Paused';
    }
    if (CLOCK_MODE === 'timer') {
      document.getElementById('modeTimer').classList.add('active');
      document.getElementById('modeStopwatch').classList.remove('active');
      document.getElementById('timerSetup').style.display = 'flex';
      document.getElementById('timerMinutes').value = Math.round(CLOCK_TARGET_SECONDS / 60);
    }
  }
  updateClockDisplay();
  await loadTodaySessions();

  document.getElementById('modeStopwatch').addEventListener('click', () => {
    if (CLOCK_RUNNING) return;
    CLOCK_MODE = 'stopwatch';
    document.getElementById('modeStopwatch').classList.add('active');
    document.getElementById('modeTimer').classList.remove('active');
    document.getElementById('timerSetup').style.display = 'none';
    document.getElementById('clockStatus').textContent = 'Not started';
  });
  document.getElementById('modeTimer').addEventListener('click', () => {
    if (CLOCK_RUNNING) return;
    CLOCK_MODE = 'timer';
    document.getElementById('modeTimer').classList.add('active');
    document.getElementById('modeStopwatch').classList.remove('active');
    document.getElementById('timerSetup').style.display = 'flex';
    CLOCK_TARGET_SECONDS = parseInt(document.getElementById('timerMinutes').value || 25) * 60;
    document.getElementById('clockStatus').textContent = 'Not started';
    updateClockDisplay();
  });
  document.getElementById('timerMinutes').addEventListener('input', function() {
    if (!CLOCK_RUNNING) {
      CLOCK_TARGET_SECONDS = parseInt(this.value || 25) * 60;
      updateClockDisplay();
    }
  });

  document.getElementById('clockStart').addEventListener('click', async () => {
    CLOCK_RUNNING = true;
    CLOCK_START_TS = Date.now();
    document.getElementById('clockStatus').textContent = 'Running — saved if you close this tab';
    setClockButtons('running');
    CLOCK_TICK = setInterval(updateClockDisplay, 1000);
    updateClockDisplay();
    await saveActiveSession();
  });
  document.getElementById('clockPause').addEventListener('click', async () => {
    CLOCK_ELAPSED_BEFORE_PAUSE = currentClockElapsed();
    CLOCK_RUNNING = false;
    clearInterval(CLOCK_TICK);
    document.getElementById('clockStatus').textContent = 'Paused';
    setClockButtons('paused');
    await saveActiveSession();
  });
  document.getElementById('clockFinish').addEventListener('click', () => finishFocusSession(false));
  document.getElementById('clockReset').addEventListener('click', async () => {
    clearInterval(CLOCK_TICK);
    CLOCK_RUNNING = false; CLOCK_ELAPSED_BEFORE_PAUSE = 0; CLOCK_START_TS = null;
    document.getElementById('clockStatus').textContent = 'Not started';
    setClockButtons('idle');
    updateClockDisplay();
    await supabaseClient.from('student_progress').update({ active_session: null }).eq('user_id', CURRENT_USER.id);
  });
}

async function saveActiveSession() {
  const payload = {
    mode: CLOCK_MODE,
    running: CLOCK_RUNNING,
    start_time: CLOCK_RUNNING ? new Date(CLOCK_START_TS).toISOString() : null,
    paused_elapsed: CLOCK_RUNNING ? 0 : CLOCK_ELAPSED_BEFORE_PAUSE,
    target_seconds: CLOCK_TARGET_SECONDS,
  };
  await supabaseClient.from('student_progress').update({ active_session: payload }).eq('user_id', CURRENT_USER.id);
}

async function finishFocusSession(auto) {
  if (!CLOCK_RUNNING && CLOCK_ELAPSED_BEFORE_PAUSE === 0) return;
  clearInterval(CLOCK_TICK);
  const seconds = CLOCK_MODE === 'timer' ? CLOCK_TARGET_SECONDS : Math.round(currentClockElapsed());

  await supabaseClient.from('focus_sessions').insert({
    user_id: CURRENT_USER.id,
    mode: CLOCK_MODE,
    seconds,
    started_at: new Date(Date.now() - seconds*1000).toISOString(),
  });
  await supabaseClient.from('student_progress').update({ active_session: null }).eq('user_id', CURRENT_USER.id);

  CLOCK_RUNNING = false; CLOCK_ELAPSED_BEFORE_PAUSE = 0; CLOCK_START_TS = null;
  document.getElementById('clockStatus').textContent = auto ? 'Timer complete — session saved' : 'Session saved';
  setClockButtons('idle');
  updateClockDisplay();
  await loadTodaySessions();
}

async function loadTodaySessions() {
  const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
  const { data } = await supabaseClient
    .from('focus_sessions')
    .select('*')
    .eq('user_id', CURRENT_USER.id)
    .gte('ended_at', startOfDay.toISOString())
    .order('ended_at', { ascending: false });

  TODAY_SESSIONS = data || [];
  const list = document.getElementById('sessionList');
  if (!list) return;

  if (!TODAY_SESSIONS.length) {
    list.innerHTML = `<div class="empty-note" style="padding:0.75rem 0;">No sessions yet today.</div>`;
  } else {
    list.innerHTML = TODAY_SESSIONS.map(s => `
      <div class="session-row">
        <span>${s.mode === 'timer' ? '⏳' : '⏱️'} ${s.mode}</span>
        <span>${Math.round(s.seconds/60)}m</span>
      </div>
    `).join('');
  }
  const total = TODAY_SESSIONS.reduce((a,s) => a + s.seconds, 0);
  document.getElementById('sessionTotal').textContent = `${Math.round(total/60)}m`;
}

renderDashboard();
</script>
