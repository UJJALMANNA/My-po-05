<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up — UM.</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at top right, #1a1230 0%, #0a0612 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e8e3f5;
    padding: 20px;
  }

  .auth-card {
    background: #14101f;
    border: 1px solid #2e2347;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 40px rgba(124, 58, 237, 0.15);
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
  }
  .logo span {
    background: linear-gradient(90deg, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tabs {
    display: flex;
    background: #1e1830;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: #9a8fb5;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    color: #fff;
  }

  form { display: none; flex-direction: column; gap: 14px; }
  form.active { display: flex; }

  label { font-size: 13px; color: #b3a8cc; margin-bottom: 4px; display: block; }

  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #2e2347;
    background: #0f0a1a;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: #a78bfa; }

  .submit-btn {
    margin-top: 8px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .message {
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .message.error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; display: block; }
  .message.success { background: rgba(34, 197, 94, 0.15); color: #86efac; display: block; }

  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #9a8fb5;
    text-decoration: none;
    font-size: 13px;
  }
  .back-link:hover { color: #fff; }
</style>
</head>
<body>

  <div class="auth-card">
    <a href="index.html" class="back-link">&larr; Back to Home</a>
    <div class="logo">UM<span>.</span> — Student Portal</div>

    <div class="tabs">
      <button class="tab-btn active" id="loginTabBtn">Login</button>
      <button class="tab-btn" id="signupTabBtn">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="active">
      <div>
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com">
      </div>
      <div>
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="submit-btn" id="loginSubmitBtn">Login</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm">
     <!-- For First NAme -->
     <div>
        <label for="signFirstname">First Name</label>
        <input type="name" id="signFirstname" required placeholder="Soumo">
      </div>
     <!-- For Last name -->
     <div>
        <label for="signLastname">Last Name</label>
        <input type="name2" id="signLastname" required placeholder="Paul">
      </div>
      <div>
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" required placeholder="you@example.com">
      </div>
      <div>
        <label for="signupMobile">Mobile Number</label>
        <input type="tel" id="signupMobile" required placeholder="+91 9876543210">
      </div>
      <div>
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" required placeholder="At least 6 characters" minlength="6">
      </div>
      <button type="submit" class="submit-btn" id="signupSubmitBtn">Create Account</button>
    </form>

    <div class="message" id="messageBox"></div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/auth-page.js"></script>
</body>
</html>
